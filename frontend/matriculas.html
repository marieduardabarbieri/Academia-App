<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gym</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="shortcut icon" type="imagex/png" href="./imagens/icon.ico" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>

  <body>
    <div class="container">
      <aside class="menu">
        <h2>
          <i class="fa-solid fa-dumbbell"></i>
          Gym
        </h2>

        <ul>
          <li>
            <a href="index.html"><i class="fa-solid fa-house"></i> Dashboard</a>
          </li>

          <li>
            <a href="alunos.html"><i class="fa-solid fa-user"></i> Alunos</a>
          </li>

          <li>
            <a href="instrutores.html"
              ><i class="fa-solid fa-user-tie"></i> Instrutores</a
            >
          </li>

          <li>
            <a href="exercicios.html"
              ><i class="fa-solid fa-person-running"></i> Exercícios</a
            >
          </li>

          <li>
            <a href="treinos.html"
              ><i class="fa-solid fa-clipboard-list"></i> Treinos</a
            >
          </li>

          <li class="ativo">
            <a href="matriculas.html">
              <i class="fa-solid fa-id-card"></i>
              Matrículas
            </a>
          </li>
        </ul>
      </aside>

      <main>
        <header>
          <h1>Cadastro de Matrículas</h1>
        </header>

        <section class="card">
          <form id="formMatricula">
            <div class="campo">
              <label>Aluno</label>

              <select id="aluno">
                <option value="">Selecione</option>
              </select>
            </div>

            <div class="campo">
              <label>Treino</label>

              <select id="treino">
                <option value="">Selecione</option>
              </select>
            </div>

            <div class="campo">
              <label>Data de início</label>

              <input id="dataInicio" type="date" />
            </div>

            <div class="campo">
              <label>Status</label>

              <select id="status">
                <option value="true">Ativa</option>

                <option value="false">Inativa</option>
              </select>
            </div>

            <button id="btnSalvar" type="submit">Salvar</button>
          </form>
        </section>

        <section class="card">
          <table>
            <thead>
              <tr>
                <th>Aluno</th>
                <th>Treino</th>
                <th>Data</th>
                <th>Status</th>
                <th>Ações</th>
              </tr>
            </thead>

            <tbody id="listaMatriculas"></tbody>
          </table>
        </section>
      </main>
    </div>

    <script src="js/matriculas.js"></script>
  </body>
</html>
